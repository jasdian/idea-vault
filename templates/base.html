<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>idea-vault</title>
    <script>
      // No-flash theme init: apply the saved theme to <html> BEFORE the stylesheet paints.
      // With no saved choice, data-theme is absent and the CSS follows prefers-color-scheme.
      (function () {
        try {
          var t = localStorage.getItem("idea-vault-theme");
          if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/static/app.css" />
    <script src="/static/htmx.min.js"></script>
    <script>
      // Light/dark toggle. A stamped data-theme overrides the system preference; the icon shows
      // the mode you'd switch TO. Persisted in localStorage and re-applied by the head script.
      (function () {
        var KEY = "idea-vault-theme";
        function systemDark() {
          return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        }
        function effective() {
          return document.documentElement.getAttribute("data-theme") || (systemDark() ? "dark" : "light");
        }
        function updateIcon() {
          var b = document.getElementById("theme-toggle");
          if (!b) return;
          var dark = effective() === "dark";
          b.textContent = dark ? "☀ light" : "☾ dark";
          b.setAttribute("aria-pressed", String(dark));
        }
        window.__toggleTheme = function () {
          var next = effective() === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          try { localStorage.setItem(KEY, next); } catch (e) {}
          updateIcon();
        };
        document.addEventListener("DOMContentLoaded", updateIcon);
      })();

      // Rail wayfinding: mark the active nav item, and let "＋ New idea" focus the create field.
      (function () {
        function markActive() {
          var path = location.pathname;
          document.querySelectorAll(".rail__link").forEach(function (a) {
            var m = a.getAttribute("data-match");
            var active = m === "/" ? (path === "/" || path.indexOf("/idea") === 0) : path.indexOf(m) === 0;
            a.classList.toggle("is-active", active);
          });
        }
        function focusNew() {
          if (location.hash !== "#new") return;
          var el = document.getElementById("new");
          if (el) { el.focus(); el.scrollIntoView({ block: "center" }); }
        }
        document.addEventListener("DOMContentLoaded", function () { markActive(); focusNew(); });
        window.addEventListener("hashchange", focusNew);
      })();

      // Command palette: global search + new-idea from any page. Opens on the rail Search button
      // or ⌘K/Ctrl+K; closes on Esc or a backdrop click. The input reuses the live /search endpoint.
      (function () {
        // Resolve the palette lazily: this script lives in <head>, so #palette (end of <body>)
        // doesn't exist yet at parse time. Looking it up on demand avoids a stale null capture
        // that would make every open() a silent no-op.
        function open() {
          var pal = document.getElementById("palette");
          if (!pal) return;
          pal.hidden = false;
          document.body.classList.add("palette-open");
          var input = document.getElementById("palette-input");
          if (input) { input.focus(); input.select(); }
        }
        function close() {
          var pal = document.getElementById("palette");
          if (!pal || pal.hidden) return;
          pal.hidden = true;
          document.body.classList.remove("palette-open");
        }
        document.addEventListener("DOMContentLoaded", function () {
          var openBtn = document.getElementById("palette-open");
          if (openBtn) openBtn.addEventListener("click", open);
          var pal = document.getElementById("palette");
          if (pal) pal.querySelectorAll("[data-palette-close]").forEach(function (el) {
            el.addEventListener("click", close);
          });
        });
        document.addEventListener("keydown", function (e) {
          if ((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")) { e.preventDefault(); open(); }
          else if (e.key === "Escape") { close(); }
        });
      })();

      // OS-aware shortcut label: the ⌘ glyph is a lie off macOS. Rewrite marked badges to "Ctrl K"
      // on non-Mac platforms so Linux/Windows owners see the key they actually press.
      (function () {
        var mac = /Mac|iPhone|iPad|iPod/.test(navigator.platform || navigator.userAgent || "");
        if (mac) return;
        document.addEventListener("DOMContentLoaded", function () {
          document.querySelectorAll('[data-kbd="mod-k"]').forEach(function (el) { el.textContent = "Ctrl K"; });
        });
      })();

      // Progressive enhancement: give every code block (e.g. a generated build prompt) a Copy
      // button. Delegated + idempotent, and re-run after each HTMX swap so polled-in blocks get one.
      function addCopyButtons() {
        document.querySelectorAll(".turn__body pre").forEach(function (pre) {
          if (pre.querySelector(".copy-btn")) return;
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "copy-btn";
          btn.textContent = "copy";
          btn.addEventListener("click", function () {
            navigator.clipboard.writeText(pre.innerText).then(function () {
              btn.textContent = "copied";
              setTimeout(function () { btn.textContent = "copy"; }, 1500);
            });
          });
          pre.appendChild(btn);
        });
      }
      document.addEventListener("DOMContentLoaded", addCopyButtons);
      document.body.addEventListener("htmx:afterSwap", addCopyButtons);
    </script>
  </head>
  <body>
    <div class="app">
      <nav class="rail" aria-label="Primary">
        <a class="rail__brand" href="/">idea·<b>vault</b></a>

        <div class="rail__actions">
          <a class="rail__action" href="/#new">＋&nbsp;New idea</a>
          <button type="button" class="rail__action" id="palette-open" aria-haspopup="dialog">
            ⌕&nbsp;Search <kbd class="rail__kbd" data-kbd="mod-k">⌘K</kbd>
          </button>
        </div>

        <div class="rail__nav">
          <a class="rail__link" href="/" data-match="/">Ideas</a>
          <a class="rail__link" href="/mcp" data-match="/mcp">MCP</a>
          <a class="rail__link" href="/settings" data-match="/settings">Settings</a>
        </div>

        <div class="rail__spacer"></div>

        <button id="theme-toggle" class="theme-toggle" type="button"
                onclick="__toggleTheme()" aria-pressed="false"
                aria-label="Toggle light or dark theme" title="Toggle light / dark">☾&nbsp;dark</button>
      </nav>

      <main class="leaf">
        {% block content %}{% endblock %}
      </main>
    </div>

    <div id="palette" class="palette" hidden>
      <div class="palette__backdrop" data-palette-close></div>
      <div class="palette__card" role="dialog" aria-modal="true" aria-label="Search ideas">
        <input id="palette-input" class="palette__input" type="search" name="q"
               placeholder="Search ideas…" autocomplete="off"
               hx-get="/search" hx-trigger="keyup changed delay:300ms, search"
               hx-target="#palette-results" />
        <div id="palette-results" class="palette__results"></div>
        <div class="palette__foot">
          <a class="rail__action" href="/#new" data-palette-close>＋&nbsp;New idea</a>
          <span class="palette__hint"><kbd class="rail__kbd">Esc</kbd> to close</span>
        </div>
      </div>
    </div>
  </body>
</html>
