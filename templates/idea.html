{% extends "base.html" %}

{% block content %}
<a class="crumb" href="/">← all ideas</a>
<h1 class="title">{{ title }}</h1>
<div class="idea-subhead">
  <span id="idea-state" class="state state--{{ state }}">{{ state }}</span>
  <a class="btw-link" href="/idea/{{ slug }}/history" title="See the full thread; fork it into a new idea">btw — history &amp; fork ↗</a>
</div>

<div class="statement">{{ body_html|safe }}</div>

{{ memory_html|safe }}

<div id="discussion" data-slug="{{ slug }}">{{ panel_html|safe }}</div>

<form class="danger-zone" hx-post="/idea/{{ slug }}/delete"
      hx-confirm="Permanently delete “{{ title }}” and its entire history (conversation + memory)? This cannot be undone.">
  <button type="submit" class="btn-danger">Delete this idea</button>
</form>
{% endblock %}
