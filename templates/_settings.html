<form id="settings" class="settings" hx-post="/settings" hx-target="#settings" hx-swap="outerHTML"
      hx-disabled-elt="find button">
  {% if saved %}<p class="settings__saved">Saved — effective on your next message.</p>{% endif %}

  <fieldset class="settings__group">
    <legend>backend</legend>
    <label class="opt">
      <input type="radio" name="backend" value="ollama" {% if is_ollama %}checked{% endif %} />
      <span><strong>Local</strong> · Ollama <span class="muted">({{ ollama_model }})</span> — offline, private</span>
    </label>
    <label class="opt">
      <input type="radio" name="backend" value="claude-code" {% if !is_ollama %}checked{% endif %} />
      <span><strong>Claude Code</strong> — agentic; reads your vaults</span>
    </label>
  </fieldset>

  <div class="settings__params">
    <label class="field">
      <span class="field__label">local temperature</span>
      <input type="number" name="temperature" min="0" max="2" step="0.05" value="{{ temperature }}" />
      <span class="field__hint">0 = focused · 2 = wild</span>
    </label>
    <label class="field">
      <span class="field__label">claude model</span>
      <input type="text" name="claude_model" value="{{ claude_model }}" placeholder="(CLI default)" />
      <span class="field__hint">e.g. sonnet, opus, haiku — blank uses the CLI default</span>
    </label>
    <label class="field">
      <span class="field__label">claude effort</span>
      <select name="effort">
        <option value="low"{% if effort == "low" %} selected{% endif %}>low</option>
        <option value="medium"{% if effort == "medium" %} selected{% endif %}>medium</option>
        <option value="high"{% if effort == "high" %} selected{% endif %}>high</option>
      </select>
      <span class="field__hint">depth of reasoning</span>
    </label>
  </div>

  <fieldset class="settings__group">
    <legend>context window</legend>
    <label class="field">
      <span class="field__label">local ctx (tokens)</span>
      <input type="number" name="ollama_ctx_tokens" min="0" value="{{ ollama_ctx_tokens }}" />
      <span class="field__hint">0 = auto (derived from the model)</span>
    </label>
    <label class="field">
      <span class="field__label">claude ctx (tokens)</span>
      <input type="number" name="claude_ctx_tokens" min="0" value="{{ claude_ctx_tokens }}" />
      <span class="field__hint">0 = auto (derived from the model)</span>
    </label>
    <p class="field__hint">effective now: {{ effective_ctx }} tokens</p>
  </fieldset>

  <fieldset class="settings__group">
    <legend>web access</legend>
    <label class="opt">
      <input type="checkbox" name="web_access" value="true" {% if web_access %}checked{% endif %} />
      <span>Let the foil crawl the internet — search + fetch pages on Ollama (built-in tools),
        WebSearch/WebFetch on claude-code. Off = fully offline.</span>
    </label>
  </fieldset>

  <fieldset class="settings__group">
    <legend>auto-compact</legend>
    <label class="opt">
      <input type="checkbox" name="auto_compact" value="true" {% if auto_compact %}checked{% endif %} />
      <span>Fold older turns into a rolling summary as the discussion grows</span>
    </label>
    <label class="field">
      <span class="field__label">compact at</span>
      <input type="number" name="compact_threshold" min="0.5" max="0.95" step="0.05" value="{{ compact_threshold }}" />
      <span class="field__hint">fraction of the context budget (0.50–0.95) before a fold fires</span>
    </label>
  </fieldset>

  <button type="submit" class="btn">Save settings</button>
</form>
