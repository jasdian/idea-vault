<div class="turn turn-{{ role }}">
  <div class="turn-head">
    <strong>{{ role }}</strong>
    <form hx-post="/idea/{{ slug }}/turn/{{ index }}/delete"
          hx-target="#transcript" hx-swap="innerHTML"
          hx-confirm="Remove this message?">
      <button type="submit" class="turn-remove" title="Remove this message">✕</button>
    </form>
  </div>
  <div class="turn-content">{{ content_html|safe }}</div>
</div>
