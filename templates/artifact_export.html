<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knowledge report — {{ idea_title }}</title>
<style>
  body { font-family: Georgia, 'Times New Roman', serif; color: #1d1d33; margin: 0;
         background: #faf9f5; line-height: 1.55; }
  main { max-width: 46rem; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
  h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
  h2 { font-size: 1.15rem; margin-top: 2.2rem; border-bottom: 1px solid #d8d5ea;
       padding-bottom: 0.25rem; }
  .provenance { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.75rem;
                color: #6c6a85; margin-bottom: 2rem; }
  .summary { border-left: 3px solid #4b4a8f; padding-left: 1rem; }
  code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.9em; }
  table { border-collapse: collapse; } td, th { border: 1px solid #d8d5ea; padding: 0.3rem 0.6rem; }
  @media (prefers-color-scheme: dark) {
    body { background: #16151f; color: #e6e4f0; }
    h2 { border-color: #38364e; }
    .provenance { color: #908da8; }
    .summary { border-color: #8886d6; }
    td, th { border-color: #38364e; }
  }
</style>
</head>
<body>
<main>
  <h1>Knowledge report — {{ idea_title }}</h1>
  <p class="provenance">generated {{ generated }} · {{ model }} · idea-vault</p>

  {% if !summary_html.is_empty() %}
  <h2>Synthesis</h2>
  <div class="summary">{{ summary_html|safe }}</div>
  {% endif %}

  {% for section in sections %}
  <h2>{{ section.title }}</h2>
  <div>{{ section.body_html|safe }}</div>
  {% endfor %}
</main>
</body>
</html>
