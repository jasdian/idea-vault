<div class="discussion" hx-ext="sse">
  <div id="transcript">
    {% for t in turns_html %}{{ t|safe }}{% endfor %}
  </div>
  {% if ai_available %}
  <form hx-post="/idea/{{ slug }}/chat" hx-target="#transcript" hx-swap="beforeend">
    <textarea name="message" placeholder="Push the idea…" rows="3"></textarea>
    <button type="submit">Send</button>
  </form>
  {% else %}
  <p class="banner">AI is unavailable — {{ unavailable_hint }}. Browsing still works;
    the compose box is disabled until the model is ready.</p>
  <form>
    <textarea name="message" rows="3" disabled></textarea>
    <button type="submit" disabled>Send</button>
  </form>
  {% endif %}
</div>
