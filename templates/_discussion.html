<div class="discussion">
  <div id="transcript">{{ transcript_html|safe }}</div>

  {% if ai_available %}
  <form class="composer" hx-post="/idea/{{ slug }}/chat" hx-target="#transcript" hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <textarea name="message" rows="3"
              placeholder="Push the idea — steelman it, then break it."></textarea>
    <div class="composer__row">
      <button type="submit" class="btn">Send</button>
    </div>
  </form>

  {{ actions_html|safe }}

  {% else %}
  <p class="note">The foil is offline — {{ unavailable_hint }}. Browsing still works; composing
    resumes once the model is ready.</p>
  {% endif %}
</div>
