name: idea-vault

services:
  idea-vault:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${IDEA_VAULT_UID:-1000}
        APP_GID: ${IDEA_VAULT_GID:-1000}
    image: idea-vault:latest
    container_name: idea-vault
    restart: unless-stopped
    # Run as the host user so the bind-mounted ./vault (owned by that user)
    # and the named index volume (chowned to this uid in the image) are both
    # writable. Defaults to 1000; override in .env if `id -u` differs.
    user: "${IDEA_VAULT_UID:-1000}:${IDEA_VAULT_GID:-1000}"
    environment:
      # Bind to all interfaces INSIDE the container (host publish is loopback-only).
      IDEA_VAULT_BIND: "0.0.0.0:3000"
      IDEA_VAULT_VAULT_DIR: "/vault"
      IDEA_VAULT_INDEX_PATH: "/data/index.db"
      # Reach Ollama over the compose network by service name, NOT localhost.
      IDEA_VAULT_OLLAMA_URL: "http://ollama:11434"
      IDEA_VAULT_OLLAMA_MODEL: "${IDEA_VAULT_OLLAMA_MODEL:-qwen3.5:4b}"
      # Initial Ollama context-window override in tokens; 0 = auto (docs/adr/0014). Forwarded
      # from .env so the containerized run honors it; still retunable live via /settings.
      IDEA_VAULT_OLLAMA_CTX_TOKENS: "${IDEA_VAULT_OLLAMA_CTX_TOKENS:-0}"
      RUST_LOG: "${RUST_LOG:-info}"
    ports:
      # Loopback by default: open http://localhost:<IDEA_VAULT_HOST_PORT> on the host,
      # not exposed to LAN. Set IDEA_VAULT_HOST_BIND_IP=0.0.0.0 (or a specific LAN
      # interface IP) in .env to opt in to LAN exposure — the app has no auth of its
      # own, so only do this on a trusted network. The container always listens on
      # 3000 (see IDEA_VAULT_BIND above).
      - "${IDEA_VAULT_HOST_BIND_IP:-127.0.0.1}:${IDEA_VAULT_HOST_PORT:-3000}:3000"
    volumes:
      # SOURCE OF TRUTH: bind mount the user-owned vault directory.
      - ./vault:/vault
      # Rebuildable SQLite index: app-managed named volume.
      - idea-index:/data
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/admin/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "4m"
        max-file: "10"

  ollama:
    image: ollama/ollama:latest
    container_name: idea-vault-ollama
    restart: unless-stopped
    ports:
      # Loopback-only so the host `ollama` CLI can pull/manage models. Intentionally
      # NOT tied to IDEA_VAULT_HOST_BIND_IP: Ollama has no auth, so it stays
      # loopback-only even when the app itself is opted in to LAN exposure.
      # The app does NOT use this; it talks over the compose network.
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      # `ollama list` succeeds only when the server is up. No extra tooling.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "4m"
        max-file: "10"

  # One-shot model bootstrap (profile-gated, cosmic migrate pattern):
  #   docker compose --profile tools run --rm ollama-pull
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["tools"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    command: ["pull", "${IDEA_VAULT_OLLAMA_MODEL:-qwen3.5:4b}"]
    restart: "no"

  # One-shot: import a LOCAL .gguf as an Ollama model (instead of pulling from the registry),
  # for a fine-tuned/offline weight file — the cosmic-mmo local-GGUF pattern, adapted to Ollama.
  #   IDEA_VAULT_MODELS_DIR=/path/to/gguf-dir IDEA_VAULT_GGUF=Foo.gguf \
  #   IDEA_VAULT_OLLAMA_MODEL=my-local docker compose --profile tools run --rm ollama-import
  # Then set IDEA_VAULT_OLLAMA_MODEL=my-local in .env and `docker compose up -d`.
  ollama-import:
    image: ollama/ollama:latest
    profiles: ["tools"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    volumes:
      # The .gguf must be visible to the client that runs `ollama create`.
      - "${IDEA_VAULT_MODELS_DIR:-./llm-models}:/models:ro"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        printf 'FROM /models/%s\nPARAMETER num_ctx 8192\n' "${IDEA_VAULT_GGUF:-model.gguf}" > /tmp/Modelfile
        echo "Importing /models/${IDEA_VAULT_GGUF:-model.gguf} as '${IDEA_VAULT_OLLAMA_MODEL:-local-model}'…"
        ollama create "${IDEA_VAULT_OLLAMA_MODEL:-local-model}" -f /tmp/Modelfile
        ollama list
    restart: "no"

volumes:
  idea-index:
  ollama-models:
